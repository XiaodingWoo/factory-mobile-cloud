services:
  - type: web
    name: factory-mobile
    runtime: python
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: streamlit run mobile_cloud_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: MOBILE_PIN
        sync: false
